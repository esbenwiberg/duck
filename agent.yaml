purpose: Duck is a Claude Code skills platform that generates user-facing documentation from feature specs.

description: |
  Duck provides reusable Claude Code skills that consumer applications drop into their repositories.
  The flagship skill, generate-user-docs, reads a structured feature spec and produces polished
  MDX documentation ready for Mintlify. It handles clarification, optional screenshot capture,
  a human approval gate, and publishing — or, with --local, saves output directly inside the repo.

docs:
  specs_dir: specs/
  images_dir: images/
